name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install --user Cython==0.29.33 buildozer 

      - name: Build APK
        run: |
          # 1. Add local pip bin to path so we can find buildozer
          export PATH=$PATH:$HOME/.local/bin
          
          # 2. CRITICAL: Unset pre-installed NDK variables to prevent conflicts
          # This forces Buildozer to use the r25b version specified in your .spec
          unset ANDROID_NDK_HOME
          
          # 3. Use 'yes' to auto-accept Android SDK licenses during the build
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Compass-APK
          path: bin/*.apk